<h2 mat-dialog-title>Nuevo contador</h2>

<mat-dialog-content>
  <p>Selecciona el tipo y la categoría del contador:</p>

  <mat-form-field appearance="fill" style="width:100%; margin-bottom:0.5rem;">
    <mat-label>Tipo de contador</mat-label>
    <mat-select [(value)]="selectedType" required>
      <mat-option *ngFor="let t of types" [value]="t">{{t}}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill" style="width:100%;">
    <mat-label>Categoría</mat-label>
    <mat-select [(value)]="selectedCategory" required>
      <mat-option *ngFor="let c of categories" [value]="c">{{c}}</mat-option>
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary"
          [disabled]="!selectedType || !selectedCategory"
          (click)="continue()">
    Continuar
  </button>
</mat-dialog-actions>
